name: WF3 Corgi Carousel Post

on:
  schedule:
    # JST 5:00 = UTC 20:00 (前日)
    - cron: "0 20 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install Remotion dependencies
        working-directory: remotion
        run: npm install
      - name: Ensure Remotion's headless Chromium is installed
        working-directory: remotion
        run: npx remotion browser ensure
      - name: Generate content and post
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          IG_TOKEN_KO_GI_OMOTI: ${{ secrets.IG_TOKEN_KO_GI_OMOTI }}
        run: node scripts/generate-corgi-content.js
