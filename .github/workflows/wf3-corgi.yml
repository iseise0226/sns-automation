name: WF3 Corgi Carousel Post

on:
  schedule:
    # JST 5:20 = UTC 20:20 (前日)（他ワークフローと時間が被らないよう20分ずらし）
    - cron: "20 20 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Generate content and post
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          IG_TOKEN_KO_GI_OMOTI: ${{ secrets.IG_TOKEN_KO_GI_OMOTI }}
        run: node scripts/generate-corgi-content.js
