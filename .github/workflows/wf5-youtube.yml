name: WF5 YouTube (weekly, 1 video)

on:
  schedule:
    # 毎週水曜 JST 19:00 = UTC 10:00
    - cron: "0 10 * * 3"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install ffmpeg and Japanese fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto-cjk
      - name: Install Remotion dependencies
        working-directory: remotion
        run: npm install
      - name: Ensure Remotion's headless Chromium is installed
        working-directory: remotion
        run: npx remotion browser ensure
      - name: Install script dependencies (googleapis)
        working-directory: scripts
        run: npm install
      - name: Generate and upload YouTube video
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: node scripts/generate-youtube-video.js
