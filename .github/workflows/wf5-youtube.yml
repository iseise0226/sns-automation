name: WF5 YouTube (停止中・WF6に統合済み)

on:
  # 2026-07-16 停止: 旧SlideVideo(文字だけの簡素なスライド)の品質が低く、
  # 同じチャンネルにWF6が毎日高品質版(RichSlideVideo)を投稿しているため役目を終えた。
  # 必要になったら手動実行のみ可能。
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install ffmpeg and Japanese fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto-cjk
      - name: Install Remotion dependencies
        working-directory: remotion
        run: npm install
      - name: Ensure Remotion's headless Chromium is installed
        working-directory: remotion
        run: npx remotion browser ensure
      - name: Install script dependencies (googleapis)
        working-directory: scripts
        run: npm install
      - name: Generate and upload YouTube video
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: node scripts/generate-youtube-video.js
