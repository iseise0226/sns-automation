name: WF2 Threads Auto Post

on:
  schedule:
    # JST 8,13,20時 = UTC 23(前日),4,11時
    - cron: "0 23,4,11 * * *"
  workflow_dispatch:
    inputs:
      account:
        description: "テスト実行する1アカウントのキー（空なら全8アカウント）"
        required: false
      mode:
        description: "「cta」を指定するとCTA投稿(セッション告知等)を強制"
        required: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Post to Threads
        env:
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          THREADS_TOKEN_ISE_SATOSHI: ${{ secrets.THREADS_TOKEN_ISE_SATOSHI }}
          THREADS_TOKEN_SATOSHI_MINDSET: ${{ secrets.THREADS_TOKEN_SATOSHI_MINDSET }}
          THREADS_TOKEN_SATOSHI_MIND_COACHING: ${{ secrets.THREADS_TOKEN_SATOSHI_MIND_COACHING }}
          THREADS_TOKEN_ISE_SATO_KOSODATE: ${{ secrets.THREADS_TOKEN_ISE_SATO_KOSODATE }}
          THREADS_TOKEN_SESSI_LIFE: ${{ secrets.THREADS_TOKEN_SESSI_LIFE }}
          THREADS_TOKEN_ISE_KENKOU_OTAKU: ${{ secrets.THREADS_TOKEN_ISE_KENKOU_OTAKU }}
          THREADS_TOKEN_TABI_LIFE_DESIGN40: ${{ secrets.THREADS_TOKEN_TABI_LIFE_DESIGN40 }}
          THREADS_TOKEN_KO_GI_OMOTI: ${{ secrets.THREADS_TOKEN_KO_GI_OMOTI }}
        run: node scripts/post-threads.js ${{ github.event.inputs.account }} ${{ github.event.inputs.mode }}
