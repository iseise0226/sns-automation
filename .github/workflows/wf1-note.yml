name: WF1 Note Draft Generation

on:
  schedule:
    # JST 6:00 = UTC 21:00 (前日)
    - cron: "0 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Generate note drafts
        env:
          GROQ_API_KEY_NOTE: ${{ secrets.GROQ_API_KEY_NOTE }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          UNSPLASH_API_KEY: ${{ secrets.UNSPLASH_API_KEY }}
        run: node scripts/run-wf1.js
