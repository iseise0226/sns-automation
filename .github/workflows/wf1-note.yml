name: WF1 Note Draft Generation

on:
  schedule:
    # JST 6:10 = UTC 21:10 (前日)（他ワークフローと時間が被らないよう10分ずらし）
    - cron: "10 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Generate note drafts
        env:
          GROQ_API_KEY_NOTE: ${{ secrets.GROQ_API_KEY_NOTE }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          UNSPLASH_API_KEY: ${{ secrets.UNSPLASH_API_KEY }}
        run: node scripts/run-wf1.js
