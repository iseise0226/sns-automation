name: WF2 Corgi Image Post

on:
  schedule:
    # JST 8:15,13:15,20:15 = UTC 23:15(前日),4:15,11:15時（wf2-threadsと時間が被らないよう15分ずらし）
    - cron: "15 23,4,11 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Generate image and post to Threads
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          THREADS_TOKEN_KO_GI_OMOTI: ${{ secrets.THREADS_TOKEN_KO_GI_OMOTI }}
        run: node scripts/post-corgi.js
